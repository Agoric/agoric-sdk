name: Build Package Bundles

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      branch:
        required: false
        type: string
        default: master
    outputs:
      artifact-name:
        description: Uploaded artifact name
        value: ${{ jobs.build-bundle.outputs.artifact-name }}
      bundle-id:
        description: First bundle id emitted by the package, if any
        value: ${{ jobs.build-bundle.outputs.bundle-id }}
      branch:
        description: Branch that was built
        value: ${{ jobs.build-bundle.outputs.branch }}
  workflow_dispatch:
    inputs:
      mode:
        description: Manual entrypoint
        required: false
        type: choice
        default: build-bundles
        options:
          - build-bundles
          - deploy-ymax-release
      package:
        description: Package name
        required: false
        type: string
      branch:
        description: Branch name to checkout
        required: false
        type: string
        default: master
      target:
        description: YMax deployment target
        required: false
        type: choice
        options:
          - ymax0-devnet
          - ymax0-main
          - ymax1-main
      releaseTag:
        description: YMax release tag
        required: false
        type: string
      privateArgsOverrides:
        description: Optional JSON string to use as privateArgsOverrides
        required: false
        type: string
      ymax1Planner:
        description: Planner attestation for ymax1-main
        required: false
        type: choice
        options:
          - up
          - down

jobs:
  plan-ymax-devnet:
    runs-on: ubuntu-latest
    outputs:
      need_bundle_build: ${{ steps.plan.outputs.need_bundle_build || steps.plan_default.outputs.need_bundle_build }}
    steps:
      - name: Default plan
        if: github.event_name != 'workflow_dispatch' || inputs.mode != 'deploy-ymax-release' || inputs.target != 'ymax0-devnet'
        id: plan_default
        run: echo 'need_bundle_build=true' >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy-ymax-release' && inputs.target == 'ymax0-devnet'

      - uses: actions/setup-node@v4
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy-ymax-release' && inputs.target == 'ymax0-devnet'
        with:
          node-version: '22'

      - name: Plan devnet bundle build
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy-ymax-release' && inputs.target == 'ymax0-devnet'
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: bundle-only
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: node .github/scripts/plan-ymax-release.mjs

  build-bundle:
    needs: [plan-ymax-devnet]
    if: |
      github.event_name != 'workflow_dispatch' ||
      inputs.mode != 'deploy-ymax-release' ||
      (inputs.target == 'ymax0-devnet' && needs.plan-ymax-devnet.outputs.need_bundle_build == 'true')
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.outputs.outputs.artifact-name }}
      bundle-id: ${{ steps.outputs.outputs.bundle-id }}
      branch: ${{ steps.outputs.outputs.branch }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Require package input
        env:
          MODE: ${{ inputs.mode }}
          PACKAGE: ${{ inputs.package }}
        run: |
          if [[ "$MODE" == "deploy-ymax-release" ]]; then
            exit 0
          fi
          test -n "$PACKAGE" || {
            echo 'package input is required when mode=build-bundles' >&2
            exit 1
          }

      - name: Clean repository
        run: git clean -xdf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up yarn and install dependencies
        run: |
          bash scripts/ensure-corepack-yarn.sh
          yarn install --immutable

      - name: Build project
        run: yarn build

      - name: Build package bundle
        working-directory: ${{ inputs.mode == 'deploy-ymax-release' && 'packages/portfolio-deploy' || format('packages/{0}', inputs.package) }}
        run: |
          set -euo pipefail
          yarn build:bundle
          if jq -e '.scripts["build:bundle-id"]' package.json >/dev/null; then
            yarn build:bundle-id
          fi

      - name: Extract bundle IDs
        id: extract-bundle-ids
        working-directory: ${{ inputs.mode == 'deploy-ymax-release' && 'packages/portfolio-deploy/dist' || format('packages/{0}/dist', inputs.package) }}
        run: |
          set -euo pipefail
          bundle_ids=""
          for json_file in *.json; do
            [[ "$json_file" == *meta.json ]] && continue
            [[ -f "$json_file" ]] || continue
            hash="$(jq -r .endoZipBase64Sha512 "$json_file")"
            bundle_id="b1-$hash"
            if [[ -z "$bundle_ids" ]]; then
              bundle_ids="$bundle_id"
            else
              bundle_ids="$bundle_ids, $bundle_id"
            fi
          done
          echo "bundle_ids=$bundle_ids" >> "$GITHUB_OUTPUT"

      - name: Set outputs
        id: outputs
        env:
          ARTIFACT_NAME: ${{ inputs.mode == 'deploy-ymax-release' && 'package-artifacts-portfolio-deploy' || format('package-artifacts-{0}', inputs.package) }}
          BRANCH: ${{ inputs.branch }}
          BUNDLE_ID_GLOB: ${{ inputs.mode == 'deploy-ymax-release' && 'packages/portfolio-deploy/dist/*.bundleId' || format('packages/{0}/dist/*.bundleId', inputs.package) }}
        run: |
          set -euo pipefail
          echo "artifact-name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          shopt -s nullglob
          bundle_id_files=($BUNDLE_ID_GLOB)
          if [[ ${#bundle_id_files[@]} -ge 1 ]]; then
            echo "bundle-id=$(cat "${bundle_id_files[0]}")" >> "$GITHUB_OUTPUT"
          else
            echo "bundle-id=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.outputs.outputs.artifact-name }}
          path: ${{ inputs.mode == 'deploy-ymax-release' && 'packages/portfolio-deploy/dist/' || format('packages/{0}/dist/', inputs.package) }}

  validate-deploy-inputs:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy-ymax-release'
    runs-on: ubuntu-latest
    steps:
      - name: Require deploy inputs
        env:
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: |
          test -n "$TARGET" || {
            echo 'target input is required when mode=deploy-ymax-release' >&2
            exit 1
          }
          test -n "$RELEASE_TAG" || {
            echo 'releaseTag input is required when mode=deploy-ymax-release' >&2
            exit 1
          }

  call-ymax-release-devnet:
    needs: [plan-ymax-devnet, build-bundle, validate-deploy-inputs]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.mode == 'deploy-ymax-release' &&
      inputs.target == 'ymax0-devnet' &&
      needs.validate-deploy-inputs.result == 'success' &&
      contains(fromJSON('["success","skipped"]'), needs.build-bundle.result)
    uses: ./.github/workflows/deploy-ymax-release.yml
    secrets: inherit
    with:
      target: ${{ inputs.target }}
      releaseTag: ${{ inputs.releaseTag }}
      branch: ${{ inputs.branch }}
      artifactName: ${{ inputs.target == 'ymax0-devnet' && needs.build-bundle.outputs.artifact-name || '' }}
      bundleId: ${{ needs.build-bundle.outputs.bundle-id }}
      privateArgsOverrides: ${{ inputs.privateArgsOverrides }}
      ymax1Planner: ${{ inputs.ymax1Planner }}

  call-ymax-release:
    needs: [validate-deploy-inputs]
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy-ymax-release' && inputs.target != 'ymax0-devnet'
    uses: ./.github/workflows/deploy-ymax-release.yml
    secrets: inherit
    with:
      target: ${{ inputs.target }}
      releaseTag: ${{ inputs.releaseTag }}
      branch: ${{ inputs.branch }}
      artifactName: ''
      privateArgsOverrides: ${{ inputs.privateArgsOverrides }}
      ymax1Planner: ${{ inputs.ymax1Planner }}

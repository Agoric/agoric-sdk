name: Deploy YMax Release
# Phase 1: resolve the release, build or fetch the bundle, validate prerequisites,
# and install the bundle if needed.
# Phase 2: generate privateArgsOverrides, run the contract upgrade,
# and write release records.

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - ymax0-devnet
          - ymax0-main
          - ymax1-main
      releaseTag:
        description: Release tag to create or use
        required: true
        type: string
        default: v0.3.YYMM-betaN
      branch:
        description: Branch to build for ymax0-devnet
        required: false
        type: string
        default: master
      privateArgsOverrides:
        description: Optional JSON string to use as privateArgsOverrides
        required: false
        type: string
      signingKey:
        description: Key path used for upgrade signing
        required: true
        type: choice
        default: ci-secret
        options:
          - ci-secret
          - detached-control
          - detached-grantee
      authzGrantee:
        description: >-
          Grantee for detached-grantee signing: either its address (its
          public key is looked up on chain — fails if it has never sent a
          transaction) or its public key JSON (output of `agd keys show
          <name> --pubkey`; use this the first time a multisig grantee is
          used, since its address has no on-chain public key yet).
        required: false
        type: string
      ymax1Planner:
        description: 'Attest ymax1 planner state (must be "down" for ymax1-main upgrades). Operator is responsible for actually stopping the planner.'
        required: false
        type: choice
        options:
          - up
          - down

permissions:
  actions: read
  contents: write

concurrency:
  group: deploy-ymax-release-${{ inputs.releaseTag }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      need_bundle_build: ${{ steps.plan.outputs.need_bundle_build }}
      need_pre_upgrade: ${{ steps.plan.outputs.need_pre_upgrade }}
      need_upgrade_submit: ${{ steps.plan.outputs.need_upgrade_submit }}
      need_upgrade_confirm: ${{ steps.plan.outputs.need_upgrade_confirm }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          # Corepack is not enabled yet, so setup-node must not try to detect
          # the yarn cache.
          package-manager-cache: false

      - name: Plan deploy work
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: deploy
          PRIVATE_ARGS_OVERRIDES: ${{ inputs.privateArgsOverrides }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: node .github/scripts/plan-ymax-release.mjs

  build-bundle:
    needs: plan
    if: inputs.target == 'ymax0-devnet' && needs.plan.outputs.need_bundle_build == 'true'
    uses: ./.github/workflows/build-bundles.yml
    with:
      package: portfolio-deploy
      branch: ${{ inputs.branch }}

  pre-upgrade:
    needs: [plan, build-bundle]
    # Opt out of GitHub's implicit success() so a skipped build-bundle job
    # does not skip pre-upgrade for non-devnet targets.
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.need_pre_upgrade == 'true' &&
      (inputs.target != 'ymax0-devnet' || contains(fromJSON('["success","skipped"]'), needs.build-bundle.result))
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target == 'ymax0-devnet' && 'ymax0-devnet' || inputs.target == 'ymax0-main' && 'ymax0-mainnet' || 'ymax1-mainnet' }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Download bundle artifact
        if: inputs.target == 'ymax0-devnet' && needs.plan.outputs.need_bundle_build == 'true'
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-bundle.outputs.artifact-name }}
          path: packages/portfolio-deploy/dist

      - name: Run pre-upgrade phase
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          BRANCH: ${{ inputs.branch }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
          YMAX_INSTALL_BUNDLE_MNEMONIC: ${{ secrets.YMAX_INSTALL_BUNDLE_MNEMONIC }}
        run: |
          packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
            phase-pre-upgrade \
            --target "$TARGET" \
            --tag "$RELEASE_TAG" \
            --branch "$BRANCH"

  # Does everything short of actually broadcasting: validates inputs,
  # generates (or re-validates) the unsigned/detached artifacts, and reports
  # whether a signed tx is ready. Unprotected (no environment) so it never
  # prompts for approval — approval is reserved for upgrade-submit, and only
  # requested once there's actually something to broadcast.
  upgrade-prepare:
    needs: [plan, pre-upgrade]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.need_upgrade_submit == 'true' &&
      contains(fromJSON('["success","skipped"]'), needs.pre-upgrade.result)
    runs-on: ubuntu-latest
    outputs:
      ready_to_broadcast: ${{ steps.prepare.outputs.ready_to_broadcast }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Validate signing inputs
        env:
          AUTHZ_GRANTEE: ${{ inputs.authzGrantee }}
          SIGNING_KEY: ${{ inputs.signingKey }}
        run: |
          case "$SIGNING_KEY" in
            ci-secret|detached-control)
              if [ -n "$AUTHZ_GRANTEE" ]; then
                echo "::error::authzGrantee is only valid with signingKey=detached-grantee. Clear it or rerun with signingKey=detached-grantee."
                exit 1
              fi
              ;;
            detached-grantee)
              if [ -z "$AUTHZ_GRANTEE" ]; then
                echo "::error::authzGrantee is required with signingKey=detached-grantee. Rerun with authzGrantee set."
                exit 1
              fi
              ;;
            *)
              echo "::error::unsupported signingKey: $SIGNING_KEY"
              exit 1
              ;;
          esac

      - name: Prepare upgrade signing state
        id: prepare
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          AUTHZ_GRANTEE: ${{ inputs.authzGrantee }}
          GITHUB_TOKEN: ${{ github.token }}
          PRIVATE_ARGS_OVERRIDES: ${{ inputs.privateArgsOverrides }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          SIGNING_KEY: ${{ inputs.signingKey }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          case "$SIGNING_KEY" in
            ci-secret)
              echo "ready_to_broadcast=true" >> "$GITHUB_OUTPUT"
              ;;
            detached-control|detached-grantee)
              export GRANTEE="$AUTHZ_GRANTEE"
              generate_output="$(packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
                phase-upgrade-generate \
                --target "$TARGET" \
                --tag "$RELEASE_TAG")"
              printf '%s\n' "$generate_output"

              ready="$(jq -r '.readyToBroadcast' <<<"$generate_output")"
              echo "ready_to_broadcast=$ready" >> "$GITHUB_OUTPUT"
              if [ "$ready" != 'true' ]; then
                if [ "$SIGNING_KEY" = 'detached-grantee' ]; then
                  signed_asset="${TARGET}-authz-signed-tx.json"
                  signature_hint=" (or, for a multisig grantee, individual ${TARGET}-authz-signature-*.json files, one per cosigner)"
                else
                  signed_asset="${TARGET}-signed-tx.json"
                  signature_hint=""
                fi
                sign_command="$(jq -r '.detail.agdSignCommand' <<<"$generate_output")"
                reason="$(jq -r '.reason // ""' <<<"$generate_output")"
                message="Detached signing pending: generated or validated unsigned tx; upload $signed_asset$signature_hint to the release and rerun this workflow."
                echo "$message"
                if [ -n "$reason" ]; then
                  echo "$reason"
                fi
                echo "$sign_command"

                # Also written to the job summary (rendered prominently on
                # the run's summary page) so the required action is visible
                # without opening this step's logs.
                {
                  echo '### :key: Action required: detached signing pending'
                  echo
                  echo "$message"
                  if [ -n "$reason" ]; then
                    echo
                    echo "$reason"
                  fi
                  echo
                  echo '```sh'
                  echo "$sign_command"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
          esac

      # Enforced here, once a signed tx is actually ready, rather than
      # earlier: this job can rerun freely while cosigners are still
      # collecting signatures without requiring the planner be down for
      # the whole wait. It's also checked before upgrade-submit's approval
      # gate so a human is never asked to approve a broadcast that this
      # step would immediately block anyway.
      - name: Require ymax1 planner down
        if: steps.prepare.outputs.ready_to_broadcast == 'true' && inputs.target == 'ymax1-main' && inputs.ymax1Planner != 'down'
        run: |
          echo '::error::ymax1Planner must be down for ymax1-main. Stop the planner, then rerun this workflow with ymax1Planner=down.'
          exit 1

  # Only job that broadcasts to chain, so it's the only one gated by
  # environment approval — and only runs (so only ever prompts) once
  # upgrade-prepare reports a signed tx is actually ready to send.
  upgrade-submit:
    needs: [plan, pre-upgrade, upgrade-prepare]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.need_upgrade_submit == 'true' &&
      contains(fromJSON('["success","skipped"]'), needs.pre-upgrade.result) &&
      needs.upgrade-prepare.result == 'success' &&
      needs.upgrade-prepare.outputs.ready_to_broadcast == 'true'
    runs-on: ubuntu-latest
    outputs:
      upgrade_submitted: ${{ steps.upgrade.outputs.upgrade_submitted }}
    environment:
      name: ${{ inputs.target == 'ymax0-devnet' && 'ymax0-devnet' || inputs.target == 'ymax0-main' && 'ymax0-mainnet' || 'ymax1-mainnet' }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Run upgrade submit phase
        id: upgrade
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          AUTHZ_GRANTEE: ${{ inputs.authzGrantee }}
          GITHUB_TOKEN: ${{ github.token }}
          MNEMONIC: ${{ inputs.signingKey == 'ci-secret' && secrets.YMAX_CONTROL_MNEMONIC || '' }}
          PRIVATE_ARGS_OVERRIDES: ${{ inputs.privateArgsOverrides }}
          SIGNING_KEY: ${{ inputs.signingKey }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          export GRANTEE="$AUTHZ_GRANTEE"
          packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
            phase-upgrade-submit \
            --target "$TARGET" \
            --tag "$RELEASE_TAG"
          echo "upgrade_submitted=true" >> "$GITHUB_OUTPUT"

  upgrade-confirm:
    needs: [plan, pre-upgrade, upgrade-submit]
    if: |
      always() &&
      needs.plan.result == 'success' &&
      needs.plan.outputs.need_upgrade_confirm == 'true' &&
      (needs.plan.outputs.need_upgrade_submit != 'true' || needs.upgrade-submit.outputs.upgrade_submitted == 'true') &&
      contains(fromJSON('["success","skipped"]'), needs.pre-upgrade.result) &&
      contains(fromJSON('["success","skipped","failure"]'), needs.upgrade-submit.result)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Run upgrade confirm phase
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          GITHUB_TOKEN: ${{ github.token }}
          PRIVATE_ARGS_OVERRIDES: ${{ inputs.privateArgsOverrides }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: |
          packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
            phase-upgrade-confirm \
            --target "$TARGET" \
            --tag "$RELEASE_TAG"

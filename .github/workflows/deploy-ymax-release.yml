name: Deploy YMax Release
# Phase 1: resolve the release, build or fetch the bundle, validate prerequisites,
# and install the bundle if needed.
# Phase 2: generate privateArgsOverrides, run the contract upgrade,
# and write release records.

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      releaseTag:
        required: true
        type: string
      branch:
        required: false
        type: string
        default: master
      environmentName:
        required: true
        type: string
      artifactName:
        required: false
        type: string
      bundleId:
        required: false
        type: string
      needBundleBuild:
        required: true
        type: string
      needPreUpgrade:
        required: true
        type: string
      needUpgrade:
        required: true
        type: string
      privateArgsOverrides:
        required: false
        type: string
      ymax1Planner:
        required: false
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: deploy-ymax-release-${{ inputs.releaseTag }}
  cancel-in-progress: false

jobs:
  pre-upgrade:
    if: inputs.needPreUpgrade == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environmentName }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Require devnet artifact name
        if: inputs.target == 'ymax0-devnet' && inputs.needBundleBuild == 'true'
        env:
          ARTIFACT_NAME: ${{ inputs.artifactName }}
        run: |
          test -n "$ARTIFACT_NAME" || {
            echo 'artifactName input is required for ymax0-devnet' >&2
            exit 1
          }

      - name: Download bundle artifact
        if: inputs.target == 'ymax0-devnet' && inputs.needBundleBuild == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifactName }}
          path: packages/portfolio-deploy/dist

      - name: Run pre-upgrade phase
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          BRANCH: ${{ inputs.branch }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
          YMAX_INSTALL_BUNDLE_MNEMONIC: ${{ secrets.YMAX_INSTALL_BUNDLE_MNEMONIC }}
        run: |
          packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
            phase-pre-upgrade \
            --target "$TARGET" \
            --tag "$RELEASE_TAG" \
            --branch "$BRANCH"

  upgrade:
    needs: [pre-upgrade]
    if: |
      always() &&
      inputs.needUpgrade == 'true' &&
      contains(fromJSON('["success","skipped"]'), needs.pre-upgrade.result)
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environmentName }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-agoric-sdk-build

      - name: Require ymax1 planner down
        if: inputs.target == 'ymax1-main' && inputs.ymax1Planner != 'down'
        run: |
          echo 'ymax1Planner must be down for ymax1-main' >&2
          exit 1

      - name: Run upgrade phase
        env:
          AGORIC_NET: ${{ inputs.target == 'ymax0-devnet' && 'devnet' || 'main' }}
          GITHUB_TOKEN: ${{ github.token }}
          MNEMONIC: ${{ secrets.YMAX_CONTROL_MNEMONIC }}
          PRIVATE_ARGS_OVERRIDES: ${{ inputs.privateArgsOverrides }}
          RELEASE_TAG: ${{ inputs.releaseTag }}
          TARGET: ${{ inputs.target }}
        run: |
          packages/portfolio-deploy/scripts/ymax-deploy-target.ts \
            phase-upgrade \
            --target "$TARGET" \
            --tag "$RELEASE_TAG"

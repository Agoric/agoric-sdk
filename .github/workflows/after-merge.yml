name: Post-merge publishes/checks

# Run after merge to trunk
# Note that this relies on branch protection having:
#  Require branches to be up to date before merging
on:
  push:
    branches:
      - master
      - 'release-*'
      - 'dev-*'
  workflow_dispatch:
    inputs:
      branch:
        default: master
        description: 'Branch whose committed versions to publish for mode=release; the workflow definition still comes from the "Use workflow from" ref'
        required: false
        type: string
      mode:
        default: dev-canary
        description: 'Publish mode'
        options:
          - dev-canary
          - release
        type: choice
      tag:
        description:
          'NPM dist-tag for mode=release (e.g. agoric-upgrade-23); required in
          that mode so packages are never implicitly tagged `latest`'
        required: false
        type: string

jobs:
  build:
    if: ${{ github.repository_owner == 'agoric' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['node-new', 'node-old']
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/restore-node
        with:
          node-version: ${{ matrix.node-version}}
      - name: notify on failure
        if: failure()
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

  dev-canary:
    if: ${{ github.event_name == 'push' || inputs.mode == 'dev-canary' }}
    needs: build
    runs-on: ubuntu-latest
    # id-token: write enables npm OIDC trusted publishing; packages
    # without a trusted publisher configured on npmjs.com fall back to
    # the NPM_TOKEN .npmrc credential set up below.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/restore-node
        with:
          node-version: 'node-new'

      # Adapted from https://johnny.sh/notes/publish-canary-lerna-cicd/
      # Transitional fallback for packages not yet onboarded to OIDC trusted
      # publishing; remove once every published package has a trusted
      # publisher configured on npmjs.com.
      - name: configure NPM token
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: check credentials
        run: npm whoami
      - name: publish to NPM tag
        run: |
          set -e
          case $GITHUB_REF_NAME in
            release-*)
              # A pre-release.
              TAG=${GITHUB_REF_NAME#release-}-dev
              ;;
            dev-*)
              # A pre-release while our release branch is straying from master
              TAG=${GITHUB_REF_NAME#dev-}-dev
              ;;
            master)
              # A trunk dev release.
              TAG=dev
              ;;
            *)
              # Some other dev release.
              TAG=other-dev
              ;;
          esac
          # Prevent the version bump from failing due to uncommitted changes.
          git stash || true

          # Bump every publishable package to a prerelease whose preid
          # carries the short SHA. This mirrors what `lerna publish --canary`
          # used to do, except we have to split version-bump from publish:
          # the staging step below pre-populates each package's
          # .ts-node-pack/ contents subdir, which lerna would otherwise
          # tar BEFORE applying its in-memory canary version bump. Running
          # `lerna version` first ensures the staged manifests already have
          # the final canary version. `--canary` is a publish-only flag in
          # lerna-lite, so we encode the SHA in --preid and use
          # --force-publish to bump every workspace unconditionally.
          SHA=$(git rev-parse --short=7 HEAD)
          # without concurrency until https://github.com/Agoric/agoric-sdk/issues/8091
          yarn lerna version --concurrency 1 \
            --conventional-commits --conventional-prerelease \
            --exact --preid="$TAG-$SHA" --force-publish \
            --no-changelog --no-push --no-git-tag-version --yes

          # See scripts/packing/stage-with-ts-node-pack.mjs for why we pack
          # via --contents .ts-node-pack instead of letting lerna pack from
          # the source tree.
          node scripts/packing/stage-with-ts-node-pack.mjs
          yarn lerna publish from-package --concurrency 1 \
            --contents .ts-node-pack \
            --dist-tag="$TAG" \
            --no-verify-access --yes
          node scripts/packing/stage-with-ts-node-pack.mjs --clean

          # `lerna version --no-git-tag-version` wrote the canary bumps to the
          # package.json files on disk and never reverts them (unlike the old
          # `lerna publish --canary`, which reset the tree). Discard them so the
          # job ends with a clean working tree for restore-node's post-step
          # cleanliness check and the SHA-keyed build cache.
          git checkout -- .

          # restore any stashed changes for caching
          git stash pop || true
      - name: notify on failure
        if: failure()
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

  release-approval:
    environment:
      name: npm-publish-release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - name: record approval
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
          RELEASE_BRANCH: ${{ inputs.branch }}
        run: |
          printf "Approved publishing dist-tag '%s' from branch '%s'\n" \
            "${NPM_DIST_TAG}" "${RELEASE_BRANCH}"

  release-publish:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'release' }}
    needs:
      - build
      - release-approval
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: validate inputs
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
        run: |
          set -o errexit -o xtrace

          case "${NPM_DIST_TAG}" in
            '' | latest)
              printf "tag must name a release tag (e.g. agoric-upgrade-23); got '%s'\n" \
                "${NPM_DIST_TAG}"
              printf "Refusing to publish to '%s'.\n" "${NPM_DIST_TAG}"
              exit 1
              ;;
            *[!A-Za-z0-9._-]* | .* | -*)
              printf "tag must contain only letters, numbers, dots, underscores, and hyphens, and must not start with dot or hyphen; got '%s'\n" \
                "${NPM_DIST_TAG}"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v5

      - uses: ./.github/actions/restore-node
        with:
          node-version: 'node-new'
          ref: ${{ inputs.branch }}

      - env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        name: configure NPM token
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc

      - name: check credentials
        run: npm whoami

      - name: publish release versions to NPM
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
        run: |
          set -o errexit -o xtrace

          git log --format="Publishing versions committed as of %H: %s" --max-count="1"

          git stash || true

          AGORIC_POSTPACK_PRESERVE_PACKAGE_JSON="1" \
            yarn lerna publish from-package \
            --concurrency "1" --dist-tag "${NPM_DIST_TAG}" --loglevel "verbose" \
            --no-push --no-verify-access --yes

          git stash pop || true

      - if: failure()
        name: notify on failure
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

  coverage:
    needs: build
    runs-on: ubuntu-latest
    if: ${{github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/restore-node
        with:
          node-version: 'node-new'

      - env:
          NODE_MEMORY_SIZE: '8192'
        name: generate test coverage report
        run: ./scripts/ci/generate-test-coverage-report.sh

      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

      - name: Find Netlify site ID
        run: |
          echo "NETLIFY_SITE_ID=$(cat COVERAGE_NETLIFY_SITE_ID)" >> $GITHUB_ENV

      - uses: nwtgck/actions-netlify@v4.0.0
        with:
          # Production deployment if a push or merged PR.
          production-deploy: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
          publish-dir: coverage/html
          # SECURITY: we don't want to hand out the Github token to this action.
          # github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: notify on failure
        if: failure()
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

  benchmark:
    needs: build
    runs-on: ubuntu-latest
    if: ${{github.event_name == 'push'}}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/restore-node
        with:
          node-version: 'node-new'

      - name: benchmark changes
        env:
          AUTOBENCH_METRICS_URL: ${{ secrets.AUTOBENCH_METRICS_URL }}
        run: cd packages/swingset-runner && yarn ci:autobench

      - uses: actions/upload-artifact@v7
        with:
          name: benchmarkstats.json
          path: packages/swingset-runner/benchstats*.json

      - name: notify on failure
        if: failure()
        uses: ./.github/actions/notify-status
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}

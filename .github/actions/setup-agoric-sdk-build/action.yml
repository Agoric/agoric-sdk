name: Setup Agoric SDK Build
description: Prepare a runner to execute agoric-sdk JS build and deployment steps.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: '24'
        # Corepack is not enabled yet, so setup-node must not try to detect
        # the yarn cache.
        package-manager-cache: false

    - name: Set up yarn and install dependencies
      shell: bash
      run: |
        bash scripts/ensure-corepack-yarn.sh
        yarn install --immutable

    - name: Build project
      shell: bash
      run: yarn build

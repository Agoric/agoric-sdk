name: Daily Test Coverage Improver - Coverage Steps
description: >
  Builds the Agoric SDK monorepo, runs all package test suites with V8 coverage
  enabled via c8, generates an HTML+JSON coverage report, and uploads the result
  as a GitHub Actions artifact named "coverage".
  A running log is appended to `coverage-steps.log` in the repository root.

  Coverage report location after these steps complete:
    - coverage/html/   — HTML SPA report (open coverage/html/index.html)
    - coverage/tmp/    — Raw V8 JSON coverage files consumed by c8

runs:
  using: composite
  steps:
    # ------------------------------------------------------------------ #
    # 1. Set up Node.js (repo requires ^20.9 || ^22.11; we use 22)        #
    # ------------------------------------------------------------------ #
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Log – Set up Node.js
      shell: bash
      run: |
        echo "=== Step: Set up Node.js ===" >> coverage-steps.log
        node --version >> coverage-steps.log 2>&1
        yarn --version >> coverage-steps.log 2>&1

    # ------------------------------------------------------------------ #
    # 2. Enable corepack so the pinned Yarn version in package.json is    #
    #    honoured, then install all workspace dependencies.               #
    # ------------------------------------------------------------------ #
    - name: Enable corepack and install dependencies
      shell: bash
      run: |
        corepack enable
        yarn install
        echo "=== Step: Install dependencies ===" >> coverage-steps.log
        echo "yarn install completed" >> coverage-steps.log 2>&1

    # ------------------------------------------------------------------ #
    # 3. Build all workspaces (generates kernel bundles etc.)             #
    #    The build order is managed by the --topological flag.            #
    # ------------------------------------------------------------------ #
    - name: Build all packages
      shell: bash
      env:
        NODE_OPTIONS: '--max-old-space-size=8192'
      run: |
        echo "=== Step: Build all packages ===" >> coverage-steps.log
        yarn build 2>&1 | tee -a coverage-steps.log

    # ------------------------------------------------------------------ #
    # 4. Run tests with V8 coverage collection.                           #
    #    - NODE_V8_COVERAGE points c8 at the raw-coverage output dir      #
    #    - C8_OPTIONS=--clean=false lets coverage accumulate across pkgs  #
    #    - Uses the same script as the after-merge CI job                 #
    #    - Coverage report ends up in coverage/html (HTML SPA)            #
    # ------------------------------------------------------------------ #
    - name: Generate test coverage report
      shell: bash
      env:
        NODE_MEMORY_SIZE: '8192'
      run: |
        echo "=== Step: Generate test coverage report ===" >> coverage-steps.log
        ./scripts/ci/generate-test-coverage-report.sh 2>&1 | tee -a coverage-steps.log

    # ------------------------------------------------------------------ #
    # 5. Upload the coverage directory (html + raw json) as an artifact.  #
    #    The artifact is named "coverage" as required.                    #
    # ------------------------------------------------------------------ #
    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage
        if-no-files-found: warn

    - name: Log – Upload complete
      shell: bash
      run: |
        echo "=== Step: Coverage artifact uploaded ===" >> coverage-steps.log
        echo "Coverage HTML report: coverage/html/index.html" >> coverage-steps.log
        echo "Raw V8 coverage data: coverage/tmp/" >> coverage-steps.log

notes: "Defers endo#3153: SES 2.x removed Float{16,32,64}Array from
  universalPropertyNames (NaN side channel); this patch restores them as
  universal compartment globals. Needed because already-deployed vat bundles
  construct Float64Array (e.g. older @endo/marshal number encoding) and
  otherwise throw 'Float64Array is not a constructor' at deploy. Adopting the
  side-channel mitigation is non-trivial (must re-endow across
  kernel/liveslots/supervisors/core-eval) and is logically separable from the
  Endo sync; tracked separately."
